
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Calculator - Dark Edition</title>
  <style>
    /* Global Styles */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #161b22;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.6);
      max-width: 420px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
      color: #58a6ff;
      margin-bottom: 20px;
    }

    label {
      font-weight: 600;
      display: block;
      margin-top: 15px;
      text-align: left;
      color: #c9d1d9;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #30363d;
      border-radius: 8px;
      box-sizing: border-box;
      background: #0d1117;
      color: #f0f6fc;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border-color: #58a6ff;
      outline: none;
      box-shadow: 0px 0px 6px rgba(88, 166, 255, 0.5);
    }

    button {
      background: linear-gradient(135deg, #58a6ff, #1f6feb);
      color: white;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 18px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 12px rgba(88, 166, 255, 0.8);
    }

    .print-btn {
      background: linear-gradient(135deg, #ff7b72, #f85149);
    }

    .print-btn:hover {
      box-shadow: 0 0 12px rgba(248, 81, 73, 0.8);
    }

    #output {
      margin-top: 25px;
      font-size: 16px;
      padding: 15px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      box-shadow: inset 0px 2px 6px rgba(255, 255, 255, 0.05);
      display: none;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #30363d;
    }

    th {
      background-color: #21262d;
      color: #58a6ff;
    }

    td {
      color: #e6edf3;
    }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🌙 Bill Calculator</h2>

    <label for="gross">Gross Value (₹):</label>
    <input type="number" id="gross" placeholder="Enter Gross Value">

    <label for="entity">Entity Type:</label>
    <select id="entity">
      <option value="individual">Individual</option>
      <option value="firm">Firm</option>
    </select>

    <button onclick="calculateBill()">Calculate</button>

    <div id="output"></div>

    <button class="print-btn" onclick="printResults()">Print Results</button>
  </div>

  <script>
    // Custom GST rounding logic
    function roundGST(value) {
  let rounded = Math.round(value); // normal rounding first
  if (rounded % 2 !== 0) {
    rounded += 1; // make it even
  }
  return rounded;
}

    function calculateBill() {
      var gross = parseFloat(document.getElementById("gross").value);
      var entity = document.getElementById("entity").value;

      if (isNaN(gross) || gross <= 0) {
        alert("⚠️ Please enter a valid Gross Value.");
        return;
      }

      // Perform calculations
      var taxable = gross / 1.18;
      var IT = entity === "individual" ? Math.round(taxable * 0.01) : Math.round(taxable * 0.02);
      var WHA = Math.round(gross * 0.05);
      var GST = taxable > 250000 ? roundGST(taxable * 0.02) : 0;
      var TOT = IT + WHA;
      var net = gross - IT - WHA;
      var ECS = net - GST;

      var outputDiv = document.getElementById("output");
      outputDiv.innerHTML = `
        <table>
          <tr><th>Description</th><th>Amount (₹)</th></tr>
          <tr><td>TVWD</td><td>${gross}</td></tr>
          <tr><td>IT</td><td>${IT}</td></tr>
          <tr><td>WHA</td><td>${WHA}</td></tr>
          <tr><td>Total Deductions</td><td>${TOT}</td></tr>
          <tr><td>Net</td><td>${net}</td></tr>
          <tr><td>GST</td><td>${GST}</td></tr>
          <tr><td>ECS</td><td>${ECS}</td></tr>
        </table>
      `;
      outputDiv.style.display = "block";
    }

    function printResults() {
      var content = document.getElementById("output").innerHTML;
      var printWindow = window.open('', '', 'height=400,width=600');
      printWindow.document.write('<html><head><title>Bill Calculation</title></head><body style="font-family: Arial, sans-serif;">');
      printWindow.document.write('<h2>Bill Calculation</h2>');
      printWindow.document.write(content);
      printWindow.document.write('</body></html>');
      printWindow.document.close();
      printWindow.print();
    }
  </script>

</body>
</html>
